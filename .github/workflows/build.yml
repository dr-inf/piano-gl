name: Build

on:
  push:
  pull_request:

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Collect changed C/C++ files
        id: changed-files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"
            files=$(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}")
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              files=$(git diff --name-only "$before...${{ github.sha }}")
            else
              files=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
            fi
          fi

          files=$(printf '%s\n' "$files" | grep -E '^(include|src|examples)/.*\.(hpp|h|cpp)$' || true)

          {
            echo 'files<<EOF'
            printf '%s\n' "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check formatting
        if: steps.changed-files.outputs.files != ''
        shell: bash
        run: |
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            clang-format --dry-run --Werror "$file"
          done <<< "${{ steps.changed-files.outputs.files }}"

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --target keys keys_example --parallel

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --target keys keys_example --parallel
