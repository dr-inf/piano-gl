name: Build

on:
  push:
  pull_request:

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(find include src examples -type f \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' \))
          if [ -z "$files" ]; then
            exit 0
          fi
          clang-format --dry-run --Werror $files

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --target keys keys_example --parallel

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --target keys keys_example --parallel
